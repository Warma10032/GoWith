services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gowith
      POSTGRES_USER: gowith
      POSTGRES_PASSWORD: gowith
    # Windows 上 5432 处于 Hyper-V 动态端口排除范围（5426-5531），
    # 改用 5540 避开；.env DATABASE_URL 同步指向 5540。
    ports:
      - "5540:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gowith -d gowith"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm db:migrate && pnpm db:seed && pnpm --filter @gowith/api dev"
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://gowith:gowith@postgres:5432/gowith
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @gowith/worker dev"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://gowith:gowith@postgres:5432/gowith
      REDIS_URL: redis://redis:6379
      AI_WORKER_URL: http://ai-worker:8000
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:24-alpine
    working_dir: /workspace
    # Dev: `next dev` for hot reload. Uses compose service name for the
    # baked client URL so browser fetches also resolve inside the Docker
    # network. For host browser access, run a reverse proxy on the host or
    # set `--add-host host.docker.internal:host-gateway` and override
    # NEXT_PUBLIC_API_BASE_URL in .env.
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --dir apps/web exec next dev -p 3000 -H 0.0.0.0"
    ports:
      # 宿主机 3000 落在 Windows Hyper-V 保留段（TCP 2970-3069），
      # 改映射到 3170 避开；容器内部 next dev 仍跑 3000。
      - "3170:3000"
    env_file:
      - .env
    environment:
      CI: "true"
      # 服务端 fetch（SSR / API proxy）走 Docker 网络内的服务名。
      API_BASE_URL: http://api:4000
      # 浏览器端 fetch 不能解析 Docker 服务名，让 .env 的 localhost:4000 生效。
      # 如需覆盖请改 .env 而不是这里。
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      api:
        condition: service_started

  # Optional production profile: builds Next.js once and runs `next start`
  # (much faster first paint than `next dev`). Activate with:
  #   docker compose --profile production up web-built
  # Stop the dev `web` first to avoid the 3000 port collision.
  # Add a reverse proxy (Caddy / nginx) in front of this for browser
  # access; the baked URL points at the api service inside the network.
  web-built:
    image: node:24-alpine
    working_dir: /workspace
    profiles: ["production"]
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --dir apps/web build && pnpm --dir apps/web exec next start -p 3000 -H 0.0.0.0"
    ports:
      # 宿主机 3000 落在 Windows Hyper-V 保留段（TCP 2970-3069），
      # 改映射到 3170 避开；容器内部 next dev 仍跑 3000。
      - "3170:3000"
    env_file:
      - .env
    environment:
      CI: "true"
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
      - web_next:/workspace/apps/web/.next
    depends_on:
      api:
        condition: service_started

  ai-worker:
    build:
      context: .
      dockerfile: apps/ai-worker/Dockerfile
    working_dir: /workspace/apps/ai-worker
    command: sh -c "uv sync --extra dev --frozen --link-mode=copy && uv run --link-mode=copy uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/workspace
      - ai_worker_venv:/workspace/apps/ai-worker/.venv

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  worker_node_modules:
  shared_node_modules:
  db_node_modules:
  pnpm_store:
  ai_worker_venv:
  web_next:
