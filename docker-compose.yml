services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gowith}
      POSTGRES_USER: ${POSTGRES_USER:-gowith}
      # 生产环境必须通过 .env / secrets 注入强密码，不要使用默认值。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
    # P0-5: 公网部署必须移除 ports 映射；dev 环境通过独立 override 启用。
    # ports:
    #   - "15432:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gowith} -d ${POSTGRES_DB:-gowith}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # P0-5: Redis 启用 password；只在 Docker 网络内可达。
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    # 公网部署不应映射宿主端口。
    # ports:
    #   - "16379:6379"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm db:migrate && pnpm db:seed && pnpm --filter @gowith/api dev"
    ports:
      - "14000:14000"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://${POSTGRES_USER:-gowith}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-gowith}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379
      PORT: "14000"
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @gowith/worker dev"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://${POSTGRES_USER:-gowith}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-gowith}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379
      AI_WORKER_URL: http://ai-worker:18000
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && cd apps/web && ./node_modules/.bin/next build && exec ./node_modules/.bin/next start -p 13000 -H 0.0.0.0"
    ports:
      - "13000:13000"
    env_file:
      - .env
    environment:
      CI: "true"
      API_BASE_URL: http://api:14000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:14000}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      api:
        condition: service_started

  web-built:
    image: node:24-alpine
    working_dir: /workspace
    profiles: ["production"]
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --dir apps/web build && pnpm --dir apps/web exec next start -p 13000 -H 0.0.0.0"
    ports:
      - "13000:13000"
    env_file:
      - .env
    environment:
      CI: "true"
      API_BASE_URL: http://api:14000
      NEXT_PUBLIC_API_BASE_URL: http://api:14000
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
      - web_next:/workspace/apps/web/.next
    depends_on:
      api:
        condition: service_started

  ai-worker:
    build:
      context: .
      dockerfile: apps/ai-worker/Dockerfile
    working_dir: /workspace/apps/ai-worker
    command: sh -c "uv sync --extra dev --frozen --link-mode=copy && uv run --link-mode=copy uvicorn app.main:app --host 0.0.0.0 --port 18000 --reload"
    # P0-4: AI Worker 仅在 Docker 网络内可达，公网不暴露。
    # ports:
    #   - "18000:18000"
    expose:
      - "18000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # P0-4: 必须注入与 worker / api 一致的 shared secret
      AI_WORKER_SHARED_SECRET: ${AI_WORKER_SHARED_SECRET:?AI_WORKER_SHARED_SECRET is required}
    volumes:
      - .:/workspace
      - ai_worker_venv:/workspace/apps/ai-worker/.venv

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  worker_node_modules:
  shared_node_modules:
  db_node_modules:
  pnpm_store:
  ai_worker_venv:
  web_next:
