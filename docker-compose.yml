services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gowith
      POSTGRES_USER: gowith
      POSTGRES_PASSWORD: gowith
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gowith -d gowith"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm db:migrate && pnpm db:seed && pnpm --filter @gowith/api dev"
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://gowith:gowith@postgres:5432/gowith
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --filter @gowith/worker dev"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: postgres://gowith:gowith@postgres:5432/gowith
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm --dir apps/web exec next dev -p 3000 -H 0.0.0.0"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CI: "true"
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - worker_node_modules:/workspace/apps/worker/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      api:
        condition: service_started

  ai-worker:
    image: python:3.11-slim
    working_dir: /workspace/apps/ai-worker
    command: sh -c "pip install uv && uv sync --extra dev --frozen --link-mode=copy && uv run --link-mode=copy uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/workspace
      - ai_worker_venv:/workspace/apps/ai-worker/.venv

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  worker_node_modules:
  shared_node_modules:
  db_node_modules:
  pnpm_store:
  ai_worker_venv:
