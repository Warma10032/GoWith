# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
openapi: 3.1.0
x-ai-worker-envelope:
  description: Internal AI Worker responses include ordered subcall audit traces.
  subcall-fields:
    - call_index
    - stage
    - provider
    - model
    - prompt_version
    - input_hash
    - input_payload
    - output_payload
    - raw_output_text
    - usage
    - status
    - error_message
info:
  title: GoWith API
  version: 0.1.0
  description: MVP REST API for Bilibili shop discovery, admin review, publishing, and recommendation logging.
  x-shop-card-contract: >-
    card_payload.recommendation_score is a nullable 0-1 AI recommendation degree backed by
    card_payload.recommendation_score_evidence_ids. quality.shop_confidence remains an internal
    information-quality signal and is not a user-facing recommendation score.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: API health check
      responses:
        "200":
          description: Service is healthy.
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and an HTTP-only session cookie was set.
  /api/auth/logout:
    post:
      summary: Revoke current session
      responses:
        "200":
          description: Session revoked.
  /api/auth/me:
    get:
      summary: Get current user
      responses:
        "200":
          description: Current user or null.
  /api/admin/dashboard:
    get:
      summary: Get admin workbench counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard counters.
  /api/admin/bilibili-auth:
    get:
      summary: List Bilibili cookie pool status
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool metadata only. Encrypted Cookie values are never returned.
    post:
      summary: Store encrypted Bilibili cookie
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, cookie]
              properties:
                label:
                  type: string
                cookie:
                  type: string
                csrf_token:
                  type: string
      responses:
        "200":
          description: Cookie account saved.
  /api/admin/bilibili-auth/check:
    post:
      summary: Enqueue Bilibili cookie pool health check
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool health-check job enqueued.
        "409":
          description: task_already_running (same health-check task is already queued or running).
  /api/admin/creators:
    get:
      summary: List managed creators with optional search
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Creator list.
    post:
      summary: Create or update a creator and enqueue Bilibili profile sync
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreatorRequest"
      responses:
        "200":
          description: Creator upserted. A lightweight `sync_creator_profile` job is enqueued to fetch Bilibili username, avatar, bio, and follower count.
        "409":
          description: task_already_running (same creator profile sync task is already queued or running).
  /api/admin/creators/{id}/sync:
    post:
      summary: Enqueue creator video metadata sync and create observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and job enqueued.
        "409":
          description: task_already_running (same creator sync run is already queued or running).
  /api/admin/creators/{id}:
    get:
      summary: Get creator detail, stats, and latest observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail.
  /api/admin/creators/{id}/videos:
    get:
      summary: List all videos for a creator as admin cards
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Creator video list.
  /api/admin/videos:
    get:
      summary: List admin video tasks with search and Bilibili source links
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Video list, including `source_url` for direct Bilibili access.
  /api/admin/videos/{id}:
    get:
      summary: Get video detail, text assets, comments, AI runs, candidates, and latest run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video detail.
  /api/admin/videos/{id}/process:
    post:
      summary: Start observable video processing pipeline
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and first job enqueued.
        "409":
          description: task_already_running (same video processing run is already queued or running).
  /api/admin/videos/{id}/retry-asr:
    post:
      summary: Retry ASR for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: ASR run and job enqueued.
        "409":
          description: task_already_running (same ASR retry run is already queued or running).
  /api/admin/videos/{id}/retry-ai:
    post:
      summary: Retry AI classification and extraction for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: AI run and job enqueued.
        "409":
          description: task_already_running (same AI retry run is already queued or running).
  /api/admin/pipeline-runs:
    get:
      summary: List observable pipeline runs
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Pipeline run list.
  /api/admin/pipeline-runs/changes:
    get:
      summary: Get durable task changes after an ISO cursor
      security:
        - cookieAuth: []
      parameters:
        - name: since
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Changed pipeline runs, events, and the next cursor.
  /api/admin/task-stream:
    get:
      summary: Subscribe to admin task updates using Server-Sent Events
      security:
        - cookieAuth: []
      responses:
        "200":
          description: SSE stream emitting run.created, run.updated, pipeline.event, and heartbeat.
          content:
            text/event-stream:
              schema: { type: string }
  /api/admin/runs/{id}:
    get:
      summary: Get a pipeline or AI run with its ordered pipeline events
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Run type, run record, and ordered events.
  /api/admin/ai-runs:
    get:
      summary: List AI runs for admin debugging
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: AI run list with provider, model, prompt version, and status.
  /api/admin/videos/{id}/mark-non-shop:
    post:
      summary: Mark video as non shop visit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video updated.
  /api/admin/shop-candidates:
    get:
      summary: List shop candidates
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Candidate list, including source video title, BV id, and direct Bilibili URL.
  /api/admin/shop-candidates/{id}:
    get:
      summary: Get candidate detail with evidence and POI candidates
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate detail.
    patch:
      summary: Update candidate fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate updated.
  /api/admin/shop-candidates/{id}/search-poi:
    post:
      summary: Enqueue AMap POI search for a candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: Optional keyword override. Defaults to candidate name and location hints.
                region:
                  type: string
                  description: Optional city/district override.
                types:
                  type: string
                  description: Optional AMap typecode filter.
      responses:
        "200":
          description: POI match job enqueued.
        "409":
          description: task_already_running (same POI match task is already queued or running).
  /api/admin/shop-candidates/{id}/select-poi:
    post:
      summary: Select POI for a candidate and write review event
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poi_id]
              properties:
                poi_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Candidate matched.
        "409":
          description: task_already_running (same POI selection action is currently running).
  /api/admin/shop-candidates/{id}/promote:
    post:
      summary: Promote a poi_matched shop candidate into a draft shop
      description: |
        Creates a `shops` row from the candidate's `card_payload` / POI fields,
        or refreshes an existing draft shop with the same POI. Approved and
        published shops are linked but never overwritten by a later AI result.
        Upserts a `shop_video_mentions` row linking it back to the source video.
        Sets `shop_candidates.status = 'merged'` and `merged_shop_id` to the
        resulting shop. Writes a `review_events` audit row. Only valid when the
        candidate is in `status='poi_matched'` with a `selected_poi_id`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate promoted; draft shop available for review/publish.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  shop: { $ref: "#/components/schemas/Shop" }
                  candidate: { $ref: "#/components/schemas/ShopCandidate" }
        "404":
          description: candidate_not_found or poi_not_found
        "409":
          description: candidate_not_ready (status not 'poi_matched' or selected_poi_id missing) or task_already_running.
  /api/admin/shop-candidates/{id}/reject:
    post:
      summary: Reject a shop candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate rejected.
        "409":
          description: task_already_running (same candidate reject action is currently running).
  /api/admin/shops:
    get:
      summary: List shops
      description: |
        Filter by `?status=approved|published|draft|hidden|rejected`. The
        `/admin/shops` UI defaults to `status=approved` (already through
        admin review, awaiting publish).
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Shop list.
  /api/admin/shops/{id}:
    get:
      summary: Get shop detail with sources and review-comment evidence
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: |
            Shop record joined with its shop_video_mentions, source videos,
            creators, and `review_comments`. Each review comment contains its
            `evidence_id`, content, author metadata when captured, published
            time, likes, replies, and image URLs for the admin evidence dialog.
        "404":
          description: shop_not_found
    patch:
      summary: Update shop fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop updated.
  /api/admin/shops/{id}/approve:
    post:
      summary: Mark a draft shop as approved (admin review pass)
      description: |
        Transitions shop.status from `draft` to `approved` and writes a
        `review_events` row with `action='approve'`. The `/admin/shops/[id]`
        page surfaces this button when status='draft'. The publish endpoint
        requires status='approved'.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop approved.
        "404":
          description: shop_not_found
        "409":
          description: |
            shop_not_ready_for_approve, shop_missing_recommend_reason,
            shop_confidence_too_low, shop_has_unresolved_risks, or task_already_running.
  /api/admin/shops/{id}/publish:
    post:
      summary: Publish shop and create immutable snapshot
      description: |
        Requires the shop to already be in `status='approved'` (call
        `/approve` first). Creates a new `published_shop_snapshots` row
        with `version = max + 1` and flips the row's `is_current` to true.
        Sets `shops.status='published'`, `published_at=now()`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop published.
        "404":
          description: shop_not_found
        "409":
          description: |
            shop_not_approved, shop_missing_recommend_reason,
            shop_confidence_too_low, shop_has_unresolved_risks, or task_already_running.
  /api/admin/shops/merge:
    post:
      summary: Merge shops placeholder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Merge placeholder acknowledged.
  /api/shops/recommended:
    get:
      summary: Get rule-based recommended shops with source videos
      responses:
        "200":
          description: Recommendation request and ranked shops. Each shop may include `source_videos` for direct Bilibili access.
  /api/shops/map:
    get:
      summary: Get published shops in a map viewport with source videos
      parameters:
        - name: min_lng
          in: query
          schema: { type: number }
        - name: min_lat
          in: query
          schema: { type: number }
        - name: max_lng
          in: query
          schema: { type: number }
        - name: max_lat
          in: query
          schema: { type: number }
        - name: q
          in: query
          schema: { type: string }
          description: Optional filter over published shop name, address, city, and district.
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Published shop pins. Each shop may include `source_videos` for direct Bilibili access.
  /api/shops/search:
    get:
      summary: Search published GoWith shops
      parameters:
        - name: q
          in: query
          schema: { type: string }
          required: true
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Published shop search results with coordinates and source videos.
  /api/shops/{id}:
    get:
      summary: Get public shop detail with source video links
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Published shop detail, including source videos that link to Bilibili.
  /api/creators:
    get:
      summary: List public creators
      responses:
        "200":
          description: Active creator list.
  /api/creators/{id}:
    get:
      summary: Get creator and published shops with source videos
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail. Shops may include source videos for direct Bilibili access.
  /api/users/events:
    post:
      summary: Write user behavior event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEventRequest"
      responses:
        "200":
          description: Event stored.
  /api/users/favorites:
    post:
      summary: Favorite, want-to-go, or visited action
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteRequest"
      responses:
        "200":
          description: Favorite action stored.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: gowith_session
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    CreateCreatorRequest:
      type: object
      required: [bilibili_uid]
      properties:
        bilibili_uid:
          type: string
    UserEventRequest:
      type: object
      required: [event_name, surface]
      properties:
        event_name:
          type: string
        surface:
          type: string
        shop_id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        recommendation_request_id:
          type: string
          format: uuid
        recommendation_item_id:
          type: string
          format: uuid
        anonymous_id:
          type: string
        event_payload:
          type: object
    FavoriteRequest:
      type: object
      required: [shop_id, action_type]
      properties:
        shop_id:
          type: string
          format: uuid
        action_type:
          type: string
          enum: [favorite, want_to_go, visited]
        note:
          type: string
