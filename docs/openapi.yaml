openapi: 3.1.0
info:
  title: GoWith API
  version: 0.1.0
  description: MVP REST API for Bilibili shop discovery, admin review, publishing, and recommendation logging.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: API health check
      responses:
        "200":
          description: Service is healthy.
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and an HTTP-only session cookie was set.
  /api/auth/logout:
    post:
      summary: Revoke current session
      responses:
        "200":
          description: Session revoked.
  /api/auth/me:
    get:
      summary: Get current user
      responses:
        "200":
          description: Current user or null.
  /api/admin/dashboard:
    get:
      summary: Get admin workbench counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard counters.
  /api/admin/bilibili-auth:
    get:
      summary: List Bilibili cookie pool status
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool metadata only. Encrypted Cookie values are never returned.
    post:
      summary: Store encrypted Bilibili cookie
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, cookie]
              properties:
                label:
                  type: string
                cookie:
                  type: string
                csrf_token:
                  type: string
      responses:
        "200":
          description: Cookie account saved.
  /api/admin/bilibili-auth/check:
    post:
      summary: Enqueue Bilibili cookie pool health check
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool health-check job enqueued.
  /api/admin/creators:
    get:
      summary: List managed creators with optional search
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Creator list.
    post:
      summary: Create or update a creator and enqueue Bilibili profile sync
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreatorRequest"
      responses:
        "200":
          description: Creator upserted. A lightweight `sync_creator_profile` job is enqueued to fetch Bilibili username, avatar, bio, and follower count.
  /api/admin/creators/{id}/sync:
    post:
      summary: Enqueue creator video metadata sync and create observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and job enqueued.
  /api/admin/creators/{id}:
    get:
      summary: Get creator detail, stats, and latest observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail.
  /api/admin/creators/{id}/videos:
    get:
      summary: List all videos for a creator as admin cards
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Creator video list.
  /api/admin/videos:
    get:
      summary: List admin video tasks with search and Bilibili source links
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Video list, including `source_url` for direct Bilibili access.
  /api/admin/videos/{id}:
    get:
      summary: Get video detail, text assets, comments, AI runs, candidates, and latest run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video detail.
  /api/admin/videos/{id}/process:
    post:
      summary: Start observable video processing pipeline
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and first job enqueued.
  /api/admin/videos/{id}/retry-asr:
    post:
      summary: Retry ASR for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: ASR run and job enqueued.
  /api/admin/videos/{id}/retry-ai:
    post:
      summary: Retry AI classification and extraction for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: AI run and job enqueued.
  /api/admin/pipeline-runs:
    get:
      summary: List observable pipeline runs
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Pipeline run list.
  /api/admin/pipeline-runs/{id}/events:
    get:
      summary: Get pipeline run events for polling UI
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and ordered events.
  /api/admin/ai-runs:
    get:
      summary: List AI runs for admin debugging
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: AI run list with provider, model, prompt version, and status.
  /api/admin/videos/{id}/mark-non-shop:
    post:
      summary: Mark video as non shop visit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video updated.
  /api/admin/shop-candidates:
    get:
      summary: List shop candidates
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Candidate list, including source video title, BV id, and direct Bilibili URL.
  /api/admin/shop-candidates/{id}:
    get:
      summary: Get candidate detail with evidence and POI candidates
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate detail.
    patch:
      summary: Update candidate fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate updated.
  /api/admin/shop-candidates/{id}/search-poi:
    post:
      summary: Enqueue AMap POI search for a candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: Optional keyword override. Defaults to candidate name and location hints.
                region:
                  type: string
                  description: Optional city/district override.
                types:
                  type: string
                  description: Optional AMap typecode filter.
      responses:
        "200":
          description: POI match job enqueued.
  /api/admin/shop-candidates/{id}/select-poi:
    post:
      summary: Select POI for a candidate and write review event
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poi_id]
              properties:
                poi_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Candidate matched.
  /api/admin/shop-candidates/{id}/promote:
    post:
      summary: Promote a poi_matched shop candidate into a draft shop
      description: |
        Creates a `shops` row from the candidate's `card_payload` / POI fields
        and a `shop_video_mentions` row linking it back to the source video.
        Sets `shop_candidates.status = 'merged'` and `merged_shop_id` to the
        new shop. Writes a `review_events` audit row. Only valid when the
        candidate is in `status='poi_matched'` with a `selected_poi_id`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate promoted; new shop available for review/publish.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  shop: { $ref: "#/components/schemas/Shop" }
                  candidate: { $ref: "#/components/schemas/ShopCandidate" }
        "404":
          description: candidate_not_found or poi_not_found
        "409":
          description: candidate_not_ready (status not 'poi_matched' or selected_poi_id missing)
  /api/admin/shop-candidates/{id}/reject:
    post:
      summary: Reject a shop candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate rejected.
  /api/admin/shops:
    get:
      summary: List shops
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Shop list.
  /api/admin/shops/{id}:
    patch:
      summary: Update shop fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop updated.
  /api/admin/shops/{id}/publish:
    post:
      summary: Publish shop and create immutable snapshot
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop published.
  /api/admin/shops/merge:
    post:
      summary: Merge shops placeholder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Merge placeholder acknowledged.
  /api/shops/recommended:
    get:
      summary: Get rule-based recommended shops with source videos
      responses:
        "200":
          description: Recommendation request and ranked shops. Each shop may include `source_videos` for direct Bilibili access.
  /api/shops/map:
    get:
      summary: Get published shops in a map viewport with source videos
      parameters:
        - name: min_lng
          in: query
          schema: { type: number }
        - name: min_lat
          in: query
          schema: { type: number }
        - name: max_lng
          in: query
          schema: { type: number }
        - name: max_lat
          in: query
          schema: { type: number }
        - name: q
          in: query
          schema: { type: string }
          description: Optional filter over published shop name, address, city, and district.
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Published shop pins. Each shop may include `source_videos` for direct Bilibili access.
  /api/shops/search:
    get:
      summary: Search published GoWith shops
      parameters:
        - name: q
          in: query
          schema: { type: string }
          required: true
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Published shop search results with coordinates and source videos.
  /api/shops/{id}:
    get:
      summary: Get public shop detail with source video links
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Published shop detail, including source videos that link to Bilibili.
  /api/creators:
    get:
      summary: List public creators
      responses:
        "200":
          description: Active creator list.
  /api/creators/{id}:
    get:
      summary: Get creator and published shops with source videos
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail. Shops may include source videos for direct Bilibili access.
  /api/users/events:
    post:
      summary: Write user behavior event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEventRequest"
      responses:
        "200":
          description: Event stored.
  /api/users/favorites:
    post:
      summary: Favorite, want-to-go, or visited action
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteRequest"
      responses:
        "200":
          description: Favorite action stored.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: gowith_session
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    CreateCreatorRequest:
      type: object
      required: [bilibili_uid]
      properties:
        bilibili_uid:
          type: string
    UserEventRequest:
      type: object
      required: [event_name, surface]
      properties:
        event_name:
          type: string
        surface:
          type: string
        shop_id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        recommendation_request_id:
          type: string
          format: uuid
        recommendation_item_id:
          type: string
          format: uuid
        anonymous_id:
          type: string
        event_payload:
          type: object
    FavoriteRequest:
      type: object
      required: [shop_id, action_type]
      properties:
        shop_id:
          type: string
          format: uuid
        action_type:
          type: string
          enum: [favorite, want_to_go, visited]
        note:
          type: string
