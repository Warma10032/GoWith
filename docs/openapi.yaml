# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
openapi: 3.1.0
x-ai-worker-envelope:
  description: Internal AI Worker responses include ordered subcall audit traces.
  subcall-fields:
    - call_index
    - stage
    - provider
    - model
    - prompt_version
    - input_hash
    - input_payload
    - output_payload
    - raw_output_text
    - usage
    - status
    - error_message
info:
  title: GoWith API
  version: 0.1.0
  description: MVP REST API for Bilibili shop discovery, admin review, publishing, and recommendation logging.
  x-shop-card-contract: >-
    card_payload.recommendation_score is a nullable 0-1 AI recommendation degree backed by
    card_payload.recommendation_score_evidence_ids. quality.shop_confidence remains an internal
    information-quality signal and is not a user-facing recommendation score. Average cost,
    rating, and shop photos come only from source-labelled poi_business data.
servers:
  - url: http://localhost:14000
paths:
  /health:
    get:
      summary: API health check
      responses:
        "200":
          description: Service is healthy.
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and an HTTP-only session cookie was set.
  /api/auth/logout:
    post:
      summary: Revoke current session
      responses:
        "200":
          description: Session revoked.
  /api/auth/me:
    get:
      summary: Get current user
      responses:
        "200":
          description: Current user or null.
  /api/admin/dashboard:
    get:
      summary: Get admin workbench counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard counters.
  /api/admin/bilibili-auth:
    get:
      summary: List Bilibili cookie pool status
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool metadata only. Encrypted Cookie values are never returned.
    post:
      summary: Store encrypted Bilibili cookie
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, cookie]
              properties:
                label:
                  type: string
                cookie:
                  type: string
                csrf_token:
                  type: string
      responses:
        "200":
          description: Cookie account saved.
  /api/admin/bilibili-auth/check:
    post:
      summary: Enqueue Bilibili cookie pool health check
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cookie pool health-check job enqueued.
        "409":
          description: task_already_running (same health-check task is already queued or running).
  /api/admin/creators:
    get:
      summary: List managed creators with optional search
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/DeletedScope"
      responses:
        "200":
          description: Creator list.
    post:
      summary: Create or update a creator and enqueue Bilibili profile sync
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreatorRequest"
      responses:
        "200":
          description: Creator upserted. A lightweight `sync_creator_profile` job is enqueued to fetch Bilibili username, avatar, bio, and follower count.
        "409":
          description: task_already_running (same creator profile sync task is already queued or running).
  /api/admin/creators/{id}/sync:
    post:
      summary: Enqueue creator video metadata sync and create observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and job enqueued.
        "409":
          description: task_already_running (same creator sync run is already queued or running).
  /api/admin/creators/{id}:
    get:
      summary: Get creator detail, stats, and latest observable run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail.
    patch:
      summary: Update creator manual overrides and management settings
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCreatorRequest" }
      responses:
        "200": { description: Creator updated and audited. }
        "409": { description: version_conflict or already_deleted }
    delete:
      summary: Move creator and its active videos to recycle bin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteEntityRequest" }
      responses:
        "200": { description: Creator and affected videos soft deleted and audited. }
        "409": { description: version_conflict or already_deleted }
  /api/admin/creators/{id}/restore:
    post:
      summary: Restore a creator and videos deleted in the same batch
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Creator restored as paused; matching batch videos restored. }
  /api/admin/creators/{id}/videos:
    get:
      summary: List all videos for a creator as admin cards
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/DeletedScope"
      responses:
        "200":
          description: Creator video list.
  /api/admin/videos:
    get:
      summary: List admin video tasks with search and Bilibili source links
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - name: content_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Video list, including `source_url` for direct Bilibili access.
  /api/admin/videos/{id}:
    get:
      summary: Get video detail, text assets, comments, AI runs, candidates, and latest run
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video detail.
    patch:
      summary: Update video manual overrides
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateVideoRequest" }
      responses:
        "200": { description: Video updated and audited. }
        "409": { description: version_conflict or already_deleted }
    delete:
      summary: Move a video to recycle bin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteEntityRequest" }
      responses:
        "200": { description: Video soft deleted; affected shops revalidated. }
        "409": { description: version_conflict or already_deleted }
  /api/admin/videos/{id}/restore:
    post:
      summary: Restore a soft-deleted video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Video restored without auto-publishing affected shops. }
  /api/admin/videos/{id}/process:
    post:
      summary: Start observable video processing pipeline
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pipeline run and first job enqueued.
        "409":
          description: task_already_running (same video processing run is already queued or running).
  /api/admin/videos/{id}/retry-asr:
    post:
      summary: Retry ASR for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: ASR run and job enqueued.
        "409":
          description: task_already_running (same ASR retry run is already queued or running).
  /api/admin/videos/{id}/retry-ai:
    post:
      summary: Retry AI classification and extraction for a video
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: AI run and job enqueued.
        "409":
          description: task_already_running (same AI retry run is already queued or running).
  /api/admin/pipeline-runs:
    get:
      summary: List observable pipeline runs
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/DeletedScope"
      responses:
        "200":
          description: Pipeline run list.
  /api/admin/pipeline-runs/changes:
    get:
      summary: Get durable task changes after an ISO cursor
      security:
        - cookieAuth: []
      parameters:
        - name: since
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Changed pipeline runs, events, and the next cursor.
  /api/admin/task-stream:
    get:
      summary: Subscribe to admin task updates using Server-Sent Events
      security:
        - cookieAuth: []
      responses:
        "200":
          description: SSE stream emitting run.created, run.updated, pipeline.event, and heartbeat.
          content:
            text/event-stream:
              schema: { type: string }
  /api/admin/runs/{id}:
    get:
      summary: Get a pipeline or AI run with its ordered pipeline events
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Run type, run record, and ordered events.
  /api/admin/ai-runs:
    get:
      summary: List AI runs for admin debugging
      security:
        - cookieAuth: []
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: AI run list with provider, model, prompt version, and status.
  /api/admin/videos/{id}/mark-non-shop:
    post:
      summary: Mark video as non shop visit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Video updated.
  /api/admin/shop-candidates:
    get:
      summary: List shop candidates
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Candidate list, including source video title, BV id, and direct Bilibili URL.
  /api/admin/shop-candidates/{id}:
    get:
      summary: Get candidate detail with evidence and POI candidates
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate detail.
    patch:
      summary: Update candidate fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate updated.
  /api/admin/shop-candidates/{id}/search-poi:
    post:
      summary: Enqueue AMap POI search for a candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: Optional keyword override. Defaults to candidate name and location hints.
                region:
                  type: string
                  description: Optional city/district override.
                types:
                  type: string
                  description: Optional AMap typecode filter.
      responses:
        "200":
          description: POI match job enqueued.
        "409":
          description: task_already_running (same POI match task is already queued or running).
  /api/admin/shop-candidates/{id}/select-poi:
    post:
      summary: Select POI for a candidate and write review event
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poi_id]
              properties:
                poi_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Candidate matched.
        "409":
          description: task_already_running (same POI selection action is currently running).
  /api/admin/shop-candidates/{id}/promote:
    post:
      summary: Promote a poi_matched shop candidate into a draft shop
      description: |
        Creates a `shops` row from the candidate's `card_payload` / POI fields,
        or refreshes an existing draft shop with the same POI. Approved and
        published shops are linked but never overwritten by a later AI result.
        Upserts a `shop_video_mentions` row linking it back to the source video.
        Sets `shop_candidates.status = 'merged'` and `merged_shop_id` to the
        resulting shop. Writes a `review_events` audit row. Only valid when the
        candidate is in `status='poi_matched'` with a `selected_poi_id`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate promoted; draft shop available for review/publish.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  shop: { $ref: "#/components/schemas/Shop" }
                  candidate: { $ref: "#/components/schemas/ShopCandidate" }
        "404":
          description: candidate_not_found or poi_not_found
        "409":
          description: candidate_not_ready (status not 'poi_matched' or selected_poi_id missing) or task_already_running.
  /api/admin/shop-candidates/{id}/reject:
    post:
      summary: Reject a shop candidate
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Candidate rejected.
        "409":
          description: task_already_running (same candidate reject action is currently running).
  /api/admin/shops:
    get:
      summary: List shops
      description: |
        Filter by `?status=approved|published|draft|hidden|rejected`. The
        `/admin/shops` UI defaults to `status=approved` (already through
        admin review, awaiting publish).
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Shop list.
  /api/admin/shops/{id}:
    get:
      summary: Get shop detail with sources and review-comment evidence
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: |
            Shop record joined with its shop_video_mentions, source videos,
            creators, and `review_comments`. Each review comment contains its
            `evidence_id`, content, author metadata when captured, published
            time, likes, replies, and image URLs for the admin evidence dialog.
        "404":
          description: shop_not_found
    patch:
      summary: Update typed curated shop fields
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateShopRequest" }
      responses:
        "200":
          description: Shop updated and audited; approved shops return to draft.
        "409":
          description: edit_requires_unpublish, version_conflict, or already_deleted
    delete:
      summary: Move a shop to recycle bin and take it offline
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteEntityRequest" }
      responses:
        "200": { description: Shop soft deleted and audited; immutable snapshots retained. }
        "409": { description: version_conflict or already_deleted }
  /api/admin/shops/{id}/restore:
    post:
      summary: Restore a shop as hidden
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Shop restored as hidden and requires review before publication. }
  /api/admin/shops/{id}/unpublish:
    post:
      summary: Take a published shop offline as hidden
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Shop unpublished and audited. }
        "409": { description: shop_not_published or version_conflict }
  /api/admin/shops/{id}/submit-review:
    post:
      summary: Submit a hidden or rejected shop for review
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Shop moved to draft and audited. }
  /api/admin/shops/{id}/reject:
    post:
      summary: Reject a shop review with a reason
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReasonedActionRequest" }
      responses:
        "200": { description: Shop rejected and audited. }
  /api/admin/shops/{id}/review-aspects/{aspect}:
    patch:
      summary: Edit one current shop review aspect without mutating AI history
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: aspect
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 80 }
      responses:
        "200": { description: Current aggregated review aspect updated and audited. }
    delete:
      summary: Remove one current shop review aspect without deleting AI evidence
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: aspect
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 80 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VersionedReasonRequest" }
      responses:
        "200": { description: Current aspect removed and audited; original AI rows retained. }
  /api/admin/shops/{id}/external-links/dianping:
    put:
      summary: Bind or replace a confirmed Dianping shop link
      description: |
        Accepts an HTTPS URL on `dianping.com` or one of its subdomains.
        The API never fetches the submitted page. A standard `/shop/{id}` URL
        stores the external shop ID; other official share links keep a null ID.
        The action writes a `review_events` audit row.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  maxLength: 2048
      responses:
        "200":
          description: Dianping link bound and audited.
        "400":
          description: invalid_dianping_url
        "404":
          description: shop_not_found
        "409":
          description: dianping_shop_already_bound or task_already_running
    delete:
      summary: Remove the confirmed Dianping shop link
      description: Marks the link as removed and writes a `review_events` audit row.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Dianping link removed and audited.
        "404":
          description: dianping_link_not_found
        "409":
          description: task_already_running
  /api/admin/shops/{id}/approve:
    post:
      summary: Mark a draft shop as approved (admin review pass)
      description: |
        Transitions shop.status from `draft` to `approved` and writes a
        `review_events` row with `action='approve'`. The `/admin/shops/[id]`
        page surfaces this button when status='draft'. The publish endpoint
        requires status='approved'.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop approved.
        "404":
          description: shop_not_found
        "409":
          description: |
            shop_not_ready_for_approve, shop_missing_recommend_reason,
            shop_confidence_too_low, shop_has_unresolved_risks, or task_already_running.
  /api/admin/shops/{id}/publish:
    post:
      summary: Publish shop and create immutable snapshot
      description: |
        Requires the shop to already be in `status='approved'` (call
        `/approve` first). Creates a new `published_shop_snapshots` row
        with `version = max + 1` and flips the row's `is_current` to true.
        Sets `shops.status='published'`, `published_at=now()`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Shop published.
        "404":
          description: shop_not_found
        "409":
          description: |
            shop_not_approved, shop_missing_recommend_reason,
            shop_confidence_too_low, shop_has_unresolved_risks, or task_already_running.
  /api/admin/shops/merge:
    post:
      summary: Merge shops placeholder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Merge placeholder acknowledged.
  /api/shops/recommended:
    get:
      summary: Get location-aware recommended shops with source videos
      parameters:
        - name: lng
          in: query
          schema: { type: number, minimum: -180, maximum: 180 }
          description: Exact user longitude. Must be provided together with lat.
        - name: lat
          in: query
          schema: { type: number, minimum: -90, maximum: 90 }
          description: Exact user latitude. Must be provided together with lng.
        - name: coord_type
          in: query
          schema: { type: string, enum: [wgs84, gcj02], default: wgs84 }
        - name: anonymous_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Recommendation request and ranked shops. With location, shops are ordered by `distance_m`; otherwise published recency is used. Each shop includes `source_videos`, confirmed `external_links`, and source-labelled `poi_business` data.
  /api/shops/map:
    get:
      summary: Get published shops in a map viewport with source videos
      parameters:
        - name: min_lng
          in: query
          schema: { type: number }
        - name: min_lat
          in: query
          schema: { type: number }
        - name: max_lng
          in: query
          schema: { type: number }
        - name: max_lat
          in: query
          schema: { type: number }
        - name: q
          in: query
          schema: { type: string }
          description: Optional filter over published shop name, address, city, and district.
        - name: creator_id
          in: query
          schema: { type: string, format: uuid }
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Published shop pins with `source_videos`, confirmed `external_links`, and source-labelled `poi_business` data.
  /api/shops/search:
    get:
      summary: Search published GoWith shops
      parameters:
        - name: q
          in: query
          schema: { type: string }
          required: true
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Published shop search results with coordinates and source videos.
  /api/shops/{id}:
    get:
      summary: Get public shop detail with source video links
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Published shop detail, including source videos, confirmed external platform links, and source-labelled POI business data.
  /api/creators:
    get:
      summary: List public creators
      responses:
        "200":
          description: Active creator list.
  /api/creators/{id}:
    get:
      summary: Get creator and published shops with source videos
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Creator detail. Shops may include source videos for direct Bilibili access.
  /api/users/events:
    post:
      summary: Write user behavior event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEventRequest"
      responses:
        "200":
          description: Event stored.
  /api/users/favorites:
    post:
      summary: Favorite, want-to-go, or visited action
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteRequest"
      responses:
        "200":
          description: Favorite action stored.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: gowith_session
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeletedScope:
      name: deleted
      in: query
      schema:
        type: string
        enum: [exclude, only, include]
        default: exclude
  schemas:
    ShopExternalLink:
      type: object
      required: [id, platform, url]
      properties:
        id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [dianping, meituan]
        url:
          type: string
          format: uri
    PoiBusiness:
      type: object
      required:
        [provider, rating, avg_cost, phone, business_hours, tags, photos]
      properties:
        provider:
          type: string
          enum: [amap, tencent, baidu]
        rating:
          type: [number, "null"]
        avg_cost:
          type: [number, "null"]
        phone:
          type: [string, "null"]
        business_hours:
          type: [string, "null"]
        tags:
          type: array
          items: { type: string }
        photos:
          type: array
          items:
            type: object
            required: [url]
            properties:
              title:
                type: [string, "null"]
              url:
                type: string
                format: uri
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    CreateCreatorRequest:
      type: object
      required: [bilibili_uid]
      properties:
        bilibili_uid:
          type: string
    DeleteEntityRequest:
      type: object
      required: [reason, expected_updated_at]
      properties:
        reason: { type: string, minLength: 2, maxLength: 500 }
        expected_updated_at: { type: string, format: date-time }
    ReasonedActionRequest:
      type: object
      required: [reason, expected_updated_at]
      properties:
        reason: { type: string, minLength: 2, maxLength: 500 }
        expected_updated_at: { type: string, format: date-time }
    VersionedReasonRequest:
      allOf:
        - $ref: "#/components/schemas/ReasonedActionRequest"
    UpdateCreatorRequest:
      type: object
      required: [expected_updated_at]
      properties:
        expected_updated_at: { type: string, format: date-time }
        name: { type: [string, "null"], minLength: 1, maxLength: 120 }
        bio: { type: [string, "null"], maxLength: 2000 }
        status: { type: string, enum: [active, paused] }
        sync_mode: { type: string, enum: [full, incremental] }
    UpdateVideoRequest:
      type: object
      required: [expected_updated_at]
      properties:
        expected_updated_at: { type: string, format: date-time }
        title: { type: [string, "null"], minLength: 1, maxLength: 300 }
        description: { type: [string, "null"], maxLength: 10000 }
        tags:
          type: [array, "null"]
          items: { type: string, maxLength: 80 }
        category: { type: [string, "null"], maxLength: 120 }
    UpdateShopRequest:
      type: object
      required: [expected_updated_at]
      properties:
        expected_updated_at: { type: string, format: date-time }
        display_name: { type: string, minLength: 1, maxLength: 200 }
        category_primary: { type: [string, "null"], maxLength: 120 }
        category_secondary: { type: [string, "null"], maxLength: 120 }
        province: { type: [string, "null"], maxLength: 120 }
        city: { type: [string, "null"], maxLength: 120 }
        district: { type: [string, "null"], maxLength: 120 }
        business_area: { type: [string, "null"], maxLength: 120 }
        address: { type: [string, "null"], maxLength: 500 }
        card_payload: { type: object }
    UserEventRequest:
      type: object
      required: [event_name, surface]
      properties:
        event_name:
          type: string
        surface:
          type: string
        shop_id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        recommendation_request_id:
          type: string
          format: uuid
        recommendation_item_id:
          type: string
          format: uuid
        anonymous_id:
          type: string
        event_payload:
          type: object
    FavoriteRequest:
      type: object
      required: [shop_id, action_type]
      properties:
        shop_id:
          type: string
          format: uuid
        action_type:
          type: string
          enum: [favorite, want_to_go, visited]
        note:
          type: string
